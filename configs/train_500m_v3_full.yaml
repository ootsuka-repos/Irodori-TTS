# Aratako/Irodori-TTS-500M-v3 full fine-tuning on a 16 GB GPU.
model:
  latent_dim: 32
  latent_patch_size: 1
  text_vocab_size: 99574
  text_tokenizer_repo: llm-jp/llm-jp-3-150m
  model_dim: 1280
  num_layers: 12
  num_heads: 20
  mlp_ratio: 2.875
  text_mlp_ratio: 2.6
  speaker_mlp_ratio: 2.6
  text_dim: 512
  text_layers: 10
  text_heads: 8
  speaker_dim: 768
  speaker_layers: 8
  speaker_heads: 12
  speaker_patch_size: 1
  timestep_embed_dim: 512
  adaln_rank: 192
  use_duration_predictor: true
  duration_aux_dim: 14
  duration_hidden_dim: 1024
  duration_layers: 3
  duration_dropout: 0.1
  duration_attention_heads: 8
  duration_architecture: token_sum_adarn_zero_no_aux
  duration_token_init_frames: 9.0
  duration_speaker_fusion: adarn_zero

train:
  train_mode: rf
  batch_size: 8
  gradient_accumulation_steps: 1
  gradient_checkpointing: true
  data_parallel: false
  num_workers: 2
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 4
  allow_tf32: true
  compile_model: false
  precision: bf16
  optimizer: adamw8bit
  learning_rate: 0.0003
  weight_decay: 0.01
  lr_scheduler: wsd
  warmup_steps: 1000
  stable_steps: 900000
  min_lr_scale: 0.01
  max_steps: 1000000
  max_text_len: 256
  text_condition_dropout: 0.1
  speaker_condition_dropout: 0.1
  timestep_stratified: true
  max_latent_steps: 750
  rf_loss_mode: utterance_mean
  duration_loss_weight: 0.1
  duration_speaker_dropout: 0.1
  duration_huber_delta: 0.1
  log_every: 1
  tensorboard_enabled: true
  tensorboard_log_dir: tensorboard
  tensorboard_launch: true
  tensorboard_port: 6006
  save_every: 0
  save_every_epochs: 1
  checkpoint_latest_n: 3
  checkpoint_best_n: 0
  sample_every_epochs: 1
  sample_cuda_visible_devices: "0"
  sample_num_steps: 24
  sample_seconds: 5.0
  sample_seed: 20260715
  sample_reference_count: 3
  valid_ratio: 0.0
  valid_every: 0
  lora_enabled: false
  wandb_enabled: false
  seed: 0
